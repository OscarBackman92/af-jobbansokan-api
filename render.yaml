# Render blueprint: web service (Docker) + managed Postgres + daily reminders.
# Deploy: push to GitHub -> render.com -> New + Blueprint -> select repo.
services:
  - type: web
    name: ansokt
    runtime: docker
    plan: free
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      # The public hostname is trusted automatically via
      # RENDER_EXTERNAL_HOSTNAME (set by Render) in settings.py.
      # Bootstrap on first boot (idempotent; free tier has no shell):
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: BOOTSTRAP_IMPORT_QUERY
        value: utvecklare
      - key: DATABASE_URL
        fromDatabase:
          name: ansokt-db
          property: connectionString
      # E-mail (password reset + reminders). sync: false => set in Dashboard.
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "1"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Base URL for the reset link; defaults to the request origin if unset.
      - key: FRONTEND_URL
        sync: false
      # Sentry (optional). Create a project at sentry.io and paste the DSN.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

  # Daily follow-up reminders at 06:00 UTC (~07:00 CET).
  - type: cron
    name: ansokt-reminders
    runtime: docker
    schedule: "0 6 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: python backend/manage.py send_reminders
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: PYTHONPATH
        value: /app/backend
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: ansokt-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: ansokt
          envVarKey: DJANGO_SECRET_KEY
      - key: EMAIL_HOST
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST
      - key: EMAIL_PORT
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_PORT
      - key: EMAIL_HOST_USER
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST_USER
      - key: EMAIL_HOST_PASSWORD
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST_PASSWORD
      - key: EMAIL_USE_TLS
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_USE_TLS
      - key: DEFAULT_FROM_EMAIL
        fromService:
          type: web
          name: ansokt
          envVarKey: DEFAULT_FROM_EMAIL
      - key: SENTRY_DSN
        fromService:
          type: web
          name: ansokt
          envVarKey: SENTRY_DSN
      - key: SENTRY_ENVIRONMENT
        value: production

databases:
  - name: ansokt-db
    plan: free
