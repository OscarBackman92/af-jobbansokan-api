# Render blueprint: web service (Docker) + managed Postgres.
# Deploy: push to GitHub -> render.com -> New + Blueprint -> select repo.
services:
  - type: web
    name: ansokt
    runtime: docker
    plan: free
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      # The public hostname is trusted automatically via
      # RENDER_EXTERNAL_HOSTNAME (set by Render) in settings.py.
      # Bootstrap on first boot (idempotent; free tier has no shell):
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: BOOTSTRAP_IMPORT_QUERY
        value: utvecklare
      - key: DATABASE_URL
        fromDatabase:
          name: ansokt-db
          property: connectionString
      # E-mail (password reset). sync: false => Render prompts at deploy.
      # Until EMAIL_HOST is set, password reset silently sends nothing.
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "1"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Base URL for the reset link; defaults to the request origin if unset.
      - key: FRONTEND_URL
        sync: false
      # Optional: schedule `python manage.py send_reminders` daily via Render Cron.

databases:
  - name: ansokt-db
    plan: free
