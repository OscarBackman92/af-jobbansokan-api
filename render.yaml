# Render blueprint: web service (Docker) + cron jobs.
# Database: Supabase Postgres (set DATABASE_URL manually in Render dashboard).
# Deploy: push to GitHub -> render.com -> New + Blueprint -> select repo.
#
# Production: https://jobbjungeln.onrender.com (Frankfurt / EU).
# Cron job names still use the ansokt-* prefix from the original deploy.
#
# Render runs dockerCommand as argv (no shell). Use one command per cron job —
# do not combine with && in sh -c.
#
# Production security defaults:
# - Web on Starter in EU (Frankfurt).
# - Admin username is NOT preset — set DJANGO_SUPERUSER_USERNAME in the
#   Render dashboard to a unique value (not "admin").
services:
  - type: web
    name: jobbjungeln
    runtime: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      # Supabase → Project Settings → Database → Connection string (Session mode).
      # Use URI format with ?sslmode=require. See docs/claude-chrome-supabase-prompt.md.
      - key: DATABASE_URL
        sync: false
      # Bootstrap on first boot (idempotent; free tier has no shell):
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: BREVO_API_KEY
        sync: false
      # Legacy SMTP vars (optional fallback on other hosts):
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "1"
      - key: EMAIL_USE_SSL
        value: "0"
      - key: EMAIL_TIMEOUT
        value: "10"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Public contact for the privacy policy and /.well-known/security.txt.
      - key: CONTACT_EMAIL
        sync: false
      # Base URL for e-mail links and django.contrib.sites (bootstrap).
      - key: FRONTEND_URL
        value: https://jobbjungeln.onrender.com
      # Google login (optional — the SPA hides the button when unset).
      # Create an OAuth client in Google Cloud Console with the site's
      # URL as authorized redirect URI (with trailing slash).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Sentry (optional). Also configure Allowed Domains in Sentry dashboard
      # (see docs/14-sakerhet-produktion.md).
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_DSN_FRONTEND
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

  # Daily 06:00 UTC (~08:00 CEST summer): follow-up reminders.
  - type: cron
    name: ansokt-reminders
    runtime: docker
    region: frankfurt
    schedule: "0 6 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: python backend/manage.py send_reminders
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: PYTHONPATH
        value: /app/backend
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: DATABASE_URL
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: DJANGO_SECRET_KEY
      - key: EMAIL_HOST
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_HOST
      - key: BREVO_API_KEY
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: BREVO_API_KEY
      - key: EMAIL_PORT
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_PORT
      - key: EMAIL_HOST_USER
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_HOST_USER
      - key: EMAIL_HOST_PASSWORD
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_HOST_PASSWORD
      - key: EMAIL_USE_TLS
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_USE_TLS
      - key: EMAIL_USE_SSL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_USE_SSL
      - key: EMAIL_TIMEOUT
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_TIMEOUT
      - key: DEFAULT_FROM_EMAIL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: DEFAULT_FROM_EMAIL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: FRONTEND_URL
      - key: SENTRY_DSN
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: SENTRY_DSN
      - key: SENTRY_ENVIRONMENT
        value: production

  # Daily 06:15 UTC: GDPR retention (warn inactive 24 months, delete after 30 days).
  - type: cron
    name: ansokt-prune
    runtime: docker
    region: frankfurt
    schedule: "15 6 * * *"
    dockerfilePath: ./Dockerfile
