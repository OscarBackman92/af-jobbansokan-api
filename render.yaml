    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: PYTHONPATH
        value: /app/backend
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: DATABASE_URL
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: DJANGO_SECRET_KEY
      - key: EMAIL_HOST
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_HOST
      - key: BREVO_API_KEY
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: BREVO_API_KEY
      - key: EMAIL_PORT
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_PORT
      - key: EMAIL_HOST_USER
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_HOST_USER
      - key: EMAIL_HOST_PASSWORD
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_HOST_PASSWORD
      - key: EMAIL_USE_TLS
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_USE_TLS
      - key: EMAIL_USE_SSL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_USE_SSL
      - key: EMAIL_TIMEOUT
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: EMAIL_TIMEOUT
      - key: DEFAULT_FROM_EMAIL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: DEFAULT_FROM_EMAIL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: FRONTEND_URL
      - key: SENTRY_DSN
        fromService:
          type: web
          name: jobbjungeln
          envVarKey: SENTRY_DSN
      - key: SENTRY_ENVIRONMENT
        value: production

  # Monday 07:00 UTC (~09:00 CEST summer): weekly pipeline summary + saved-search digest.
