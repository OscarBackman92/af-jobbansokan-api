# Render blueprint: web service (Docker) + managed Postgres + daily reminders.
# Deploy: push to GitHub -> render.com -> New + Blueprint -> select repo.
#
# Production security defaults (points 1 & 3):
# - Paid, persistent Postgres in EU (Frankfurt) — region cannot be changed
#   after creation; existing Oregon DBs need a manual migration + new DB.
# - Web on Starter (no cold-start spin-down on free tier).
# - Admin username is NOT preset — set DJANGO_SUPERUSER_USERNAME in the
#   Render dashboard to a unique value (not "admin").
services:
  - type: web
    name: ansokt
    runtime: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      # The public hostname is trusted automatically via
      # RENDER_EXTERNAL_HOSTNAME (set by Render) in settings.py.
      # Bootstrap on first boot (idempotent; free tier has no shell):
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ansokt-db
          property: connectionString
      # E-mail. On Render use Brevo HTTP API (SMTP ports are blocked).
      - key: BREVO_API_KEY
        sync: false
      # Legacy SMTP vars (optional fallback on other hosts):
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "1"
      - key: EMAIL_USE_SSL
        value: "0"
      - key: EMAIL_TIMEOUT
        value: "10"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Public contact for the privacy policy and /.well-known/security.txt.
      - key: CONTACT_EMAIL
        sync: false
      # Base URL for the reset link; defaults to the request origin if unset.
      - key: FRONTEND_URL
        sync: false
      # Google login (optional — the SPA hides the button when unset).
      # Create an OAuth client in Google Cloud Console with the site's
      # URL as authorized redirect URI (with trailing slash).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Sentry (optional). Also configure Allowed Domains in Sentry dashboard
      # (see docs/14-sakerhet-produktion.md).
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_DSN_FRONTEND
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

  # Daily at 06:00 UTC (~07:00 CET): follow-up reminders + GDPR retention
  # (warn accounts inactive 24 months, delete 30 days after the warning).
  - type: cron
    name: ansokt-reminders
    runtime: docker
    region: frankfurt
    schedule: "0 6 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "python backend/manage.py send_reminders && python backend/manage.py prune_inactive_accounts"
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: PYTHONPATH
        value: /app/backend
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: ansokt-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: ansokt
          envVarKey: DJANGO_SECRET_KEY
      - key: EMAIL_HOST
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST
      - key: BREVO_API_KEY
        fromService:
          type: web
          name: ansokt
          envVarKey: BREVO_API_KEY
      - key: EMAIL_PORT
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_PORT
      - key: EMAIL_HOST_USER
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST_USER
      - key: EMAIL_HOST_PASSWORD
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST_PASSWORD
      - key: EMAIL_USE_TLS
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_USE_TLS
      - key: EMAIL_USE_SSL
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_USE_SSL
      - key: EMAIL_TIMEOUT
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_TIMEOUT
      - key: DEFAULT_FROM_EMAIL
        fromService:
          type: web
          name: ansokt
          envVarKey: DEFAULT_FROM_EMAIL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ansokt
          envVarKey: FRONTEND_URL
      - key: SENTRY_DSN
        fromService:
          type: web
          name: ansokt
          envVarKey: SENTRY_DSN
      - key: SENTRY_ENVIRONMENT
        value: production

  # Monday 07:00 UTC (~08:00 CET): weekly pipeline summary + saved-search digest.
  - type: cron
    name: ansokt-weekly-summary
    runtime: docker
    region: frankfurt
    schedule: "0 7 * * 1"
    dockerfilePath: ./Dockerfile
    dockerCommand: python backend/manage.py send_weekly_summary
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: PYTHONPATH
        value: /app/backend
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: ansokt-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: ansokt
          envVarKey: DJANGO_SECRET_KEY
      - key: BREVO_API_KEY
        fromService:
          type: web
          name: ansokt
          envVarKey: BREVO_API_KEY
      - key: EMAIL_HOST
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST
      - key: EMAIL_PORT
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_PORT
      - key: EMAIL_HOST_USER
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST_USER
      - key: EMAIL_HOST_PASSWORD
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_HOST_PASSWORD
      - key: EMAIL_USE_TLS
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_USE_TLS
      - key: EMAIL_USE_SSL
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_USE_SSL
      - key: EMAIL_TIMEOUT
        fromService:
          type: web
          name: ansokt
          envVarKey: EMAIL_TIMEOUT
      - key: DEFAULT_FROM_EMAIL
        fromService:
          type: web
          name: ansokt
          envVarKey: DEFAULT_FROM_EMAIL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ansokt
          envVarKey: FRONTEND_URL

databases:
  - name: ansokt-db
    plan: basic-256mb
    region: frankfurt
