# Weekly dependency update PRs. Security advisories additionally trigger
# immediate PRs regardless of the schedule.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
