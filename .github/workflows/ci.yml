name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: afapi_test
          POSTGRES_USER: afapi
          POSTGRES_PASSWORD: afapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afapi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black --check .

      - name: Pytest (against Postgres)
        env:
          PYTHONPATH: backend
          DJANGO_SETTINGS_MODULE: config.settings
          # Import-time flag: keeps prod-only hardening (SSL redirect,
          # manifest static storage) out of the test client's way.
          DJANGO_DEBUG: "1"
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: afapi_test
          DB_USER: afapi
          DB_PASSWORD: afapi
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
        run: pytest --cov=core --cov-report=term-missing --cov-fail-under=70

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  # Informational dependency audit — findings appear in the job log without
  # blocking merges (transitive CVEs often lack an upstream fix).
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt

      - name: Set up Node
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm audit (production deps, high+)
        if: always()
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
