<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f4f4f1" />
    <script>
      (function () {
        var valid = { command: 1, daylight: 1, signal: 1 };
        var t = localStorage.getItem("theme");
        if (!localStorage.getItem("token")) {
          t = "daylight";
        } else if (!valid[t]) {
          t = "daylight";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <meta
      name="description"
      content="Jobbsöket — gratis verktyg som samlar dina jobbansökningar, påminnelser och Platsbanken på ett ställe."
    />
    <title>Jobbsöket — koll på hela ditt jobbsök</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Inconsolata:wght@400;500&family=Open+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
