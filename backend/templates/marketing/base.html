{% load static %}
<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        var valid = { command: 1, daylight: 1, signal: 1 };
        var t = localStorage.getItem("theme");
        if (!valid[t]) {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "command"
            : "daylight";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <title>{% block title %}Jobbsöket — tavla för dina jobbansökningar{% endblock %}</title>
    <meta
      name="description"
      content="{% block meta_description %}Håll koll på jobbansökningar utan Excel. Platsbanken, påminnelser och export när du vill.{% endblock %}"
    />
    <link rel="canonical" href="{% block canonical %}{{ canonical_url }}{% endblock %}" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="sv_SE" />
    <meta property="og:title" content="{% block og_title %}Jobbsöket — tavla för dina jobbansökningar{% endblock %}" />
    <meta
      property="og:description"
      content="{% block og_description %}Håll koll på ansökningar utan Excel. Platsbanken, påminnelser och export när du vill.{% endblock %}"
    />
    <meta property="og:url" content="{% block og_url %}{{ canonical_url }}{% endblock %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Schibsted+Grotesk:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'marketing/marketing.css' %}" />
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <div class="marketing-wrap">
      <header class="marketing-header">
        <a class="marketing-brand" href="{{ home_url|default:'/' }}">
          <span class="marketing-logo" aria-hidden="true">J</span>
          <h1>Jobbsöket</h1>
        </a>
        <nav class="marketing-nav" aria-label="Huvudnavigering">
          <a href="{{ privacy_url }}">Integritet</a>
          <a class="btn-primary" href="{{ app_url }}">Logga in</a>
        </nav>
      </header>
      {% block content %}{% endblock %}
      <footer class="marketing-footer">
        <span class="footer-kicker">Jobbsöket</span>
        Din data är din — exportera eller radera när du vill.{" "}
        <a href="{{ privacy_url }}">Integritetspolicy</a>
        <div class="theme-picker" aria-label="Visuellt tema">
          <button type="button" data-theme="command">Command</button>
          <button type="button" data-theme="daylight">Daylight</button>
          <button type="button" data-theme="signal">Signal</button>
        </div>
      </footer>
    </div>
    <script src="{% static 'marketing/theme.js' %}"></script>
  </body>
</html>
